<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">

    <!-- Icons -->
    <script src="https://kit.fontawesome.com/57a701c981.js" crossorigin="anonymous"></script>

    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <title>Fit On - Login</title>

</head>

<body class="bg-midnight font-poppins text-midnight">
    <main>
        <section class="flex justify-between">
            <div class="">
                <a href="/view/register.html" 
                    class="flex items-center justify-center bg-paleBlue text-midnight text-2xl 
                        h-10 w-10 mt-20 ml-25 rounded-3xl shadow-xl/15 shadow-white
                        transition-all duration-300 ease-in-out 
                        hover:scale-110 active:scale-95">
                        <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>
            
            <!-- Form Login -->
            <section class="">
                <div class="bg-paleBlue h-140 w-130 rounded-3xl mt-14 mr-25">
                    <div class="pt-8 p-10">
                        <div>
                            <h1 class="text-3xl font-bold">
                                Selamat Datang Kembali
                            </h1>
        
                            <h2 class="text-xl text-gray-600">
                                Masuk dan lanjutkan perjalanan fitness mu!
                            </h2>
                        </div>


                        <div>    
                            <label for="inputEmail">Email Address</label>
                            <input type="email" id="inputEmail" class="bg-gray-200 mt-2 h-12 w-full rounded-xl">
    
                            <label for="inputPassword">Password</label>
                            <i class="fa-regular fa-eye-slash absolute pl-80 pt-11 text-2xl"></i>
                            <input type="password" id="inputPassword" class="bg-gray-200 mt-2 h-12 w-full rounded-xl">
                            <a href="/view/inputEmail.html" class="text-gray-600">
                                Forgot Password?
                            </a>
                        </div>

                        <div>
                            <button onclick="" 
                                class="bg-midnight h-12 w-full rounded-xl mt-5 shadow-xl/15 
                                      text-paleBlue font-bold
                                        transition-all duration-300 ease-in-out 
                                        hover:scale-[1.02] hover:bg-opacity-90
                                        active:scale-95">
                                        Login
                                    </button>
                        </div>
                                
                                <div class="flex items-center my-2 max-w-1/3 mx-auto">
                                    <div class="grow border-t border-gray-500"></div>
                                    <h2 class=" mx-4 text-gray-500">
                                        OR
                                    </h2>
                                    <div class="grow border-t border-gray-500"></div>
                                </div>
                                
                                <div>
                                    <button onclick="" 
                                        class="flex items-center justify-center gap-2
                                              bg-midnight h-12 w-full rounded-xl mt-2 shadow-xl/15 
                                              text-paleBlue font-bold
                                                transition-all duration-300 ease-in-out 
                                                hover:scale-[1.02] hover:bg-opacity-90
                                                active:scale-95">
                                        <iconify-icon icon="material-icon-theme:google" width="28" height="28" class=""></iconify-icon>

                                        <h2 class="text-paleBlue font-bold">
                                            Continue with Google
                                        </h2>
                                    </button>
                                </div>

                        <div class="p-2 flex items-center justify-center ">
                            <h2 class="font-medium">
                                Don't have an account? 
                                <a href="/view/register.html" class="font-bold">
                                    Register
                                </a>
                            </h2>
                        </div>
                    </div>
                </div>
            </section>
    
        </section>

    </main>
</body>
</html>
